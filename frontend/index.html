<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Analix — Sun'iy intellekt bilan biznesingizni boshqaring" />
    <meta name="theme-color" content="#05060C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Analix — Strategik Agent</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --ld-bg: #06070D;
        --ld-text: #DFE5F2;
        --ld-bar-bg: #1C2136;
      }
      [data-theme="sandstone"] :root, html[data-theme="sandstone"] {
        --ld-bg: #f5f4ef;
        --ld-text: #1a1f1c;
        --ld-bar-bg: #e8e5da;
      }
      [data-theme="porcelain"] :root, html[data-theme="porcelain"] {
        --ld-bg: #f1f3f7;
        --ld-text: #0f1a2e;
        --ld-bar-bg: #dde3ec;
      }
      body { background: var(--ld-bg, #06070D); }
      #root { height: 100vh; }
      #loading {
        position: fixed; inset: 0;
        background: var(--ld-bg, #06070D);
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        font-family: 'Syne', sans-serif;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #loading .logo {
        font-size: 28px; font-weight: 800; color: var(--ld-text, #DFE5F2); letter-spacing: -1px;
      }
      #loading .logo span { color: #c9a063; }
      #loading .bar-wrap {
        width: 120px; height: 2px; background: var(--ld-bar-bg, #1C2136); border-radius: 2px; overflow: hidden;
      }
      #loading .bar {
        height: 100%; width: 0%; background: linear-gradient(90deg, #c9a063, #00b8a9);
        border-radius: 2px; animation: load 1.2s ease forwards;
      }
      @keyframes load { to { width: 100%; } }
    </style>
    <script>
      // Loading screen mavzuga moslashish — inline (HTML bo'lmasdan oldin)
      try {
        var t = localStorage.getItem('app_theme');
        if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="loading">
      <div class="logo">ANA<span>LIX</span></div>
      <div class="bar-wrap"><div class="bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('loading');
          if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
        }, 800);
      });
    </script>
  </body>
</html>
