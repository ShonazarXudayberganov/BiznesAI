server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SSE stream — buffering o'chirilgan (harf-harf yetib kelishi uchun) ──
    location = /api/ai/agent/stream {
        proxy_pass http://biznesai_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        gzip off;
        chunked_transfer_encoding on;
        client_max_body_size 15m;
    }

    # ── AI complete (uzoq AI so'rovlar uchun timeout oshirilgan) ──
    location /api/ai/ {
        proxy_pass http://biznesai_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 15m;
    }

    # ── Backend API proxy ──
    location /api/ {
        proxy_pass http://biznesai_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 15m;
    }

    # ── Uploaded files proxy ──
    location /uploads/ {
        proxy_pass http://biznesai_backend:3001;
        proxy_set_header Host $host;
    }

    # Instagram Graph API proxy (CORS bypass)
    location /igproxy/ {
        proxy_pass https://graph.instagram.com/;
        proxy_set_header Host graph.instagram.com;
        proxy_set_header Origin "";
        proxy_ssl_server_name on;
        proxy_ssl_name graph.instagram.com;
    }

    # Facebook Graph API proxy (Instagram Business)
    location /igbizproxy/ {
        proxy_pass https://graph.facebook.com/;
        proxy_set_header Host graph.facebook.com;
        proxy_set_header Origin "";
        proxy_ssl_server_name on;
        proxy_ssl_name graph.facebook.com;
    }

    # LC-UP CRM Login proxy (CORS bypass)
    location /lcuplogin/ {
        proxy_pass https://yangiserver.lc-up.com/;
        proxy_set_header Host yangiserver.lc-up.com;
        proxy_set_header Origin "";
        proxy_ssl_server_name on;
        proxy_ssl_name yangiserver.lc-up.com;
    }

    # LC-UP CRM Data API proxy (CORS bypass)
    location /lcupapi/ {
        proxy_pass https://data.lc-up.com/;
        proxy_set_header Host data.lc-up.com;
        proxy_set_header Origin "";
        proxy_ssl_server_name on;
        proxy_ssl_name data.lc-up.com;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
