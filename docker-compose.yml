version: '3.9'

services:
  # ── PostgreSQL Database ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: biznesai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biznesai}
      POSTGRES_USER: ${POSTGRES_USER:-biznesai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env faylda o‘rnatilishi kerak}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - biznesai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biznesai -d biznesai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API (Node.js + Express) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biznesai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-biznesai}
      DB_USER: ${POSTGRES_USER:-biznesai}
      DB_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env faylda o‘rnatilishi kerak}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET .env faylda o‘rnatilishi kerak (kamida 32 belgi)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-biznesadmin@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-AnalixBot}
      BOT_WORKER_URL: http://bot-worker:3002
      BOT_WORKER_INTERNAL_SECRET: ${BOT_WORKER_INTERNAL_SECRET:?BOT_WORKER_INTERNAL_SECRET .env'da bo'lishi kerak}
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - biznesai_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Telegram Bot Worker ─────────────────────────────────
  bot-worker:
    build:
      context: ./bot-worker
      dockerfile: Dockerfile
    container_name: analix_bot_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-biznesai}
      DB_USER: ${POSTGRES_USER:-biznesai}
      DB_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env faylda o‘rnatilishi kerak}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-AnalixBot}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_ENC_KEY: ${TELEGRAM_SESSION_ENC_KEY:?TELEGRAM_SESSION_ENC_KEY .env'da bo'lishi kerak (32 bayt base64)}
      BOT_WORKER_PORT: 3002
      BOT_WORKER_INTERNAL_SECRET: ${BOT_WORKER_INTERNAL_SECRET:?BOT_WORKER_INTERNAL_SECRET .env'da bo'lishi kerak}
      BACKEND_URL: http://backend:3001
      CHANNEL_SYNC_CRON: ${CHANNEL_SYNC_CRON:-0 4 * * *}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - biznesai_net

  # ── Frontend React App ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biznesai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3010:80"
    networks:
      - biznesai_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  biznesai_net:
    driver: bridge
